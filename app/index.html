<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1f6feb">
<title>SafeCheck — Sopralluogo sicurezza</title>
<style>
  :root {
    --c: #1e9e54;        /* Conforme - verde */
    --pc: #e08a16;       /* Parz. Conforme - arancione */
    --nc: #d23b3b;       /* Non Conforme - rosso */
    --nv: #6b7280;       /* Non Verificabile - grigio */
    --na: #9aa3af;       /* Non Applicabile - grigio chiaro */
    --bg: #ffffff;
    --ink: #1a1f29;
    --muted: #5b6472;
    --line: #e2e6ec;
    --accent: #1f6feb;
    --soft: #f5f7fa;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    background: var(--soft);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    font-size: 16px;
    line-height: 1.45;
    -webkit-text-size-adjust: 100%;
  }
  #app {
    max-width: 480px;
    margin: 0 auto;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ---------- generic ---------- */
  h1 { font-size: 20px; margin: 0 0 4px; }
  h2 { font-size: 17px; margin: 0; }
  p { margin: 0 0 12px; }
  .muted { color: var(--muted); font-size: 14px; }
  .pad { padding: 18px 16px; }
  label { display: block; font-size: 13px; font-weight: 600; color: var(--muted); margin: 14px 0 6px; }
  input[type=text], input[type=date], input[type=time], textarea, select {
    width: 100%;
    font: inherit;
    padding: 12px;
    border: 1px solid var(--line);
    border-radius: 10px;
    background: #fff;
    color: var(--ink);
  }
  select { appearance: none; -webkit-appearance: none; background-image: none; }
  textarea { resize: vertical; min-height: 64px; }
  input:focus, textarea:focus, select:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(31,111,235,.15); }
  .fld-select { width: 100%; font: inherit; padding: 10px 12px; border: 1px solid var(--line); border-radius: 10px; background: #fff; color: var(--ink); appearance: none; -webkit-appearance: none; margin-bottom: 2px; }
  .fld-select:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(31,111,235,.15); }

  button { font: inherit; cursor: pointer; border: none; }
  .btn {
    display: block; width: 100%;
    padding: 15px;
    border-radius: 12px;
    font-weight: 700;
    font-size: 16px;
    background: var(--accent);
    color: #fff;
    min-height: 50px;
  }
  .btn:active { filter: brightness(.94); }
  .btn.ghost { background: #fff; color: var(--accent); border: 1.5px solid var(--accent); }
  .btn.ghost:disabled { color: var(--muted); border-color: var(--line); opacity: .55; cursor: default; }

  .brand { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .logo {
    width: 38px; height: 38px; border-radius: 10px;
    background: var(--accent); color: #fff;
    display: grid; place-items: center; font-weight: 800; font-size: 18px;
  }

  /* ---------- header / progress ---------- */
  header.bar {
    position: sticky; top: 0; z-index: 10;
    background: #fff;
    border-bottom: 1px solid var(--line);
    padding: 10px 16px 12px;
  }
  .verbale-no { font-size: 12px; font-weight: 800; color: var(--accent); letter-spacing: .4px; margin-bottom: 5px; }
  .crumbs { display: flex; justify-content: space-between; align-items: baseline; gap: 8px; }
  .crumbs strong { font-size: 15px; }
  .crumbs .count { font-size: 13px; color: var(--muted); white-space: nowrap; }
  .progress { height: 7px; background: var(--soft); border-radius: 99px; margin-top: 9px; overflow: hidden; }
  .progress > span { display: block; height: 100%; background: var(--accent); width: 0; transition: width .25s ease; }

  /* ---------- question card ---------- */
  .sec-desc { background: var(--soft); border-radius: 12px; padding: 12px 14px; margin: 0 0 6px; }
  .sec-desc .muted { margin: 0; }
  .q {
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 14px;
    margin: 12px 0;
  }
  .q.answered { border-color: #cfe3d6; }
  .q .qid { font-size: 12px; font-weight: 700; color: var(--muted); letter-spacing: .3px; }
  .q .qtext { margin: 4px 0 12px; font-size: 15.5px; line-height: 1.4; }

  .opts { display: grid; grid-template-columns: repeat(5, 1fr); gap: 7px; }
  .opt {
    min-height: 48px;
    border-radius: 11px;
    border: 1.5px solid var(--oc);
    background: #fff;
    color: var(--oc);
    font-weight: 800;
    font-size: 15px;
    display: flex; align-items: center; justify-content: center;
    transition: transform .05s ease;
  }
  .opt:active { transform: scale(.94); }
  .opt[data-v=C]  { --oc: var(--c); }
  .opt[data-v=PC] { --oc: var(--pc); }
  .opt[data-v=NC] { --oc: var(--nc); }
  .opt[data-v=NV] { --oc: var(--nv); }
  .opt[data-v=NA] { --oc: var(--na); }
  .opt.sel {
    background: var(--oc);
    color: #fff;
    border-width: 3px;
    box-shadow: 0 2px 8px rgba(0,0,0,.12);
  }
  .opt-legend { display:flex; flex-wrap:wrap; gap:10px 14px; font-size:12px; color:var(--muted); margin-top:10px; }
  .opt-legend b { color: var(--ink); }

  .qextra { margin-top: 12px; }
  .fld-label { display: block; font-size: 13px; font-weight: 700; color: var(--muted); margin: 12px 0 5px; }
  .qextra textarea { min-height: 56px; }

  /* campi extra a comparsa condizionale (animazione max-height; iOS Safari ok) */
  .collapsible { max-height: 0; overflow: hidden; opacity: 0; }
  .collapsible.anim { transition: max-height .28s ease, opacity .2s ease; }
  .collapsible.open { max-height: 800px; opacity: 1; }
  /* azione correttiva: usabile su mobile, bordo sinistro colorato per esito */
  .azione-field { min-height: 80px; font-size: 14px; border-left-width: 4px; border-left-color: var(--line); }
  .azione-field.nc { border-left-color: #c62828; }
  .azione-field.pc { border-left-color: #f57c00; }
  .warn {
    margin-top: 10px; font-size: 12.5px; font-weight: 600; color: #8a4b00;
    background: #fff4e2; border-left: 3px solid var(--pc); padding: 8px 10px; border-radius: 6px;
  }
  .hint {
    margin-top: 10px; font-size: 12.5px; color: var(--muted);
    background: #fbfcfe; border-left: 3px solid var(--line); padding: 8px 10px; border-radius: 6px;
  }

  /* badge esito (riepilogo) */
  .badge { display:inline-block; padding:2px 9px; border-radius:99px; font-size:11px; font-weight:800; color:#fff; vertical-align:middle; }
  .badge.C{background:var(--c)} .badge.PC{background:var(--pc)} .badge.NC{background:var(--nc)}
  .badge.NV{background:var(--nv)} .badge.NA{background:var(--na)}

  /* elenco NC/PC nel riepilogo */
  .findings { list-style:none; padding:0; margin:8px 0 0; }
  .findings > li { border:1px solid var(--line); border-left-width:4px; border-radius:10px; padding:11px 12px; margin-bottom:10px; }
  .findings > li.NC { border-left-color: var(--nc); }
  .findings > li.PC { border-left-color: var(--pc); }
  .findings .fhead { display:flex; justify-content:space-between; align-items:center; gap:8px; }
  .findings .fid { font-size:12px; font-weight:700; color:var(--muted); }
  .findings .ftext { font-size:14px; margin:6px 0 4px; }
  .findings .frow { font-size:13px; margin-top:6px; }
  .findings .frow .k { font-weight:700; color:var(--muted); display:block; font-size:11px; text-transform:uppercase; letter-spacing:.3px; }
  .findings .frow .v { color:var(--ink); }
  .findings .frow .v.empty { color:#b1271f; font-style:italic; }

  .navrow { display: flex; gap: 10px; margin: 18px 0 6px; }
  .navrow .btn { flex: 1; }

  /* ---------- summary ---------- */
  .tiles { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin: 8px 0 16px; }
  .tile { border-radius: 12px; padding: 12px 6px; text-align: center; color: #fff; }
  .tile .n { font-size: 22px; font-weight: 800; line-height: 1; }
  .tile .l { font-size: 11px; font-weight: 700; opacity: .95; margin-top: 4px; }
  .tile.C{background:var(--c)} .tile.PC{background:var(--pc)} .tile.NC{background:var(--nc)}
  .tile.NV{background:var(--nv)} .tile.NA{background:var(--na)}

  .panel { border: 1px solid var(--line); border-radius: 14px; padding: 14px; margin: 12px 0; }
  .miss { list-style: none; padding: 0; margin: 8px 0 0; }
  .miss li { padding: 9px 0; border-bottom: 1px solid var(--line); font-size: 14px; }
  .miss li:last-child { border-bottom: none; }
  .miss .jump { color: var(--accent); font-weight: 700; font-size: 12px; }
  .ok { color: var(--c); font-weight: 700; }

  .topnav { display:flex; gap:8px; margin-bottom:14px; }
  .topnav button { flex:1; font-size:13px; padding:9px; border-radius:10px; background:var(--soft); color:var(--muted); font-weight:600; }
  .topnav button.active { background: var(--accent); color:#fff; }

  .footer-note { font-size: 11px; color: var(--muted); text-align: center; padding: 18px 16px 28px; }
  .hidden { display: none !important; }

  /* ---------- riepilogo NC/PC ---------- */
  .rsub { color: var(--muted); font-size: 13px; margin: 2px 0 0; }
  .rmeta { font-size: 13px; color: var(--ink); margin-top: 8px; }
  .rmeta .vno { font-weight: 800; color: var(--accent); letter-spacing: .3px; }

  /* tabella conteggi per sezione */
  .sezcount { width: 100%; border-collapse: collapse; font-size: 13px; table-layout: fixed; }
  .sezcount th { background: #1e3a5f; color: #fff; padding: 8px 4px; font-size: 12px; font-weight: 700; text-align: center; }
  .sezcount th:first-child { text-align: left; padding-left: 8px; }
  .sezcount td { padding: 8px 4px; text-align: center; border-bottom: 1px solid var(--line); }
  .sezcount td:first-child { text-align: left; padding-left: 8px; }
  .sezcount .sez-nome { display: block; font-size: 11px; font-weight: 400; color: var(--muted); margin-top: 1px; }
  .sezcount tr.clean td { background: #f5f5f5; }
  .sezcount tr.hasNC td:first-child { border-left: 3px solid #c62828; }
  .sezcount tr.onlyPC td:first-child { border-left: 3px solid #f57c00; }
  .sezcount tfoot td { font-weight: 800; border-top: 2px solid #1e3a5f; background: #fff; }
  .sezcount th:not(:first-child), .sezcount td:not(:first-child) { width: 13%; }

  /* lista NC/PC/NV dettagliata */
  .badge.NV { background: #7b3fa0; }   /* NV in viola in questo elenco */
  .findlist { list-style: none; padding: 0; margin: 8px 0 0; }
  .findlist > li { border: 1px solid var(--line); border-left-width: 4px; border-radius: 10px; padding: 11px 12px; margin-bottom: 10px; }
  .findlist > li.NC { border-left-color: var(--nc); }
  .findlist > li.PC { border-left-color: var(--pc); }
  .findlist > li.NV { border-left-color: #7b3fa0; }
  .finding-top { display: flex; align-items: center; gap: 8px; }
  .finding-sez { font-size: 11px; color: var(--muted); }
  .finding-q { font-weight: 700; font-size: 14px; margin: 7px 0 4px; line-height: 1.35; }
  .finding-oss { font-size: 13px; color: var(--ink); margin: 4px 0; }
  .finding-az { font-size: 13px; color: var(--ink); margin: 4px 0; }
  .btn-mod { margin-top: 8px; padding: 8px 14px; border-radius: 9px; background: var(--soft); color: var(--accent); font-weight: 700; font-size: 13px; border: 1.5px solid var(--accent); min-height: 40px; }
  .btn-mod:active { filter: brightness(.95); }

  /* pulsante PDF blu scuro + stato disabilitato */
  .btn.btn-pdf { background: #1e3a5f; }
  .btn.btn-pdf:disabled { background: #9aa7b8; cursor: not-allowed; opacity: 1; }

  /* evidenziazione lampeggiante della domanda dopo "Modifica" */
  @keyframes scFlash {
    0%, 100% { box-shadow: 0 0 0 0 rgba(245,124,0,0); border-color: var(--line); }
    50%      { box-shadow: 0 0 0 3px #f57c00; border-color: #f57c00; }
  }
  .q.flash { animation: scFlash .5s ease-in-out 0s 4; }

  /* ---------- campo nominativo (campo_extra SEZ-01) ---------- */
  .nom-single { margin-bottom: 2px; }
  .nom-tags { display: flex; flex-wrap: wrap; gap: 6px; margin: 2px 0 8px; }
  .nom-empty { font-size: 12px; color: var(--muted); font-style: italic; }
  .nom-tag {
    display: inline-flex; align-items: center; gap: 5px;
    background: #e8f0fe; color: #1e3a5f;
    border-radius: 12px; padding: 3px 8px; font-size: 12px; font-weight: 600;
  }
  .nom-tag .nom-x { cursor: pointer; font-weight: 800; font-size: 14px; line-height: 1; color: #1e3a5f; opacity: .7; padding: 0 2px; }
  .nom-tag .nom-x:active { opacity: 1; }
  .nom-add { display: flex; gap: 8px; align-items: stretch; }
  .nom-add .nom-input { flex: 1; }
  .nom-add .nom-add-btn {
    flex: 0 0 auto; padding: 0 14px; border-radius: 10px;
    background: var(--accent); color: #fff; font-weight: 700; font-size: 14px; white-space: nowrap;
  }
  .nom-add .nom-add-btn:active { filter: brightness(.94); }

  /* ---------- contatore obbligatorie mancanti (riepilogo, sopra pulsante PDF) ---------- */
  .pdf-missing-counter {
    background: #fff4e2; border-left: 3px solid #f57c00; color: #8a4b00;
    padding: 10px; border-radius: 6px; font-size: 13px; font-weight: 600;
    margin: 14px 0 8px;
  }
</style>
<!-- Generazione PDF lato browser: jsPDF + AutoTable (CDN, serve connessione solo al primo carico) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
</head>
<body>
<div id="app"></div>

<script>
"use strict";

/* =========================================================================
   DOMANDE — incorporato da:
   seed/templates/verbale-sopralluogo-sicurezza-lavoro-v1.cleanroom.json (v1.0.3)
   48 domande in 7 sezioni. note_tecnico = guida interna alla compilazione.
   ========================================================================= */
const DOMANDE = {
  template_id: "verbale-sopralluogo-sicurezza-lavoro-v1",
  versione: "1.0.3",
  sezioni: [
    { id:"SEZ-01", nome:"Organizzazione della sicurezza",
      descrizione:"Struttura organizzativa della sicurezza: nomine, deleghe, organigramma.",
      domande:[
        {id:"D-01-009", testo:"Nomina e documentazione Datore di Lavoro (DL)", nt:"Individuazione del Datore di Lavoro ai sensi dell'art. 2 e relative deleghe di funzioni (art. 16), ove presenti.", campo_extra:{tipo:"nominativo", label:"DL", multiplo:false}},
        {id:"D-01-001", testo:"È presente e documentato l'atto di nomina del Responsabile del Servizio di Prevenzione e Protezione (RSPP)?", nt:"Verificare che la nomina sia sottoscritta dal datore di lavoro e accettata dal nominato (art. 32).", campo_extra:{tipo:"nominativo", label:"RSPP", multiplo:false}},
        {id:"D-01-003", testo:"Sono presenti e documentate le nomine degli Addetti al Servizio di Prevenzione e Protezione (ASPP), ove previsti?", nt:"Gli ASPP sono obbligatori solo in alcune tipologie/dimensioni aziendali.", campo_extra:{tipo:"nominativo", label:"ASPP", multiplo:true}},
        {id:"D-01-002", testo:"È presente e documentato l'atto di nomina del Medico Competente (ove previsto dalla valutazione del rischio)?", nt:"Obbligatoria solo se il DVR prevede sorveglianza sanitaria. Non richiedere se non prevista.", campo_extra:{tipo:"nominativo", label:"MC", multiplo:true}},
        {id:"D-01-006", testo:"È presente la designazione del Rappresentante dei Lavoratori per la Sicurezza (RLS) o risulta eletto/nominato?", nt:"L'assenza di RLS non è sempre NC automatica: in alcuni casi supplisce l'RLST territoriale.", campo_extra:{tipo:"nominativo", label:"RLS", multiplo:true}},
        {id:"D-01-004", testo:"Sono presenti e documentate le nomine degli Addetti Antincendio e delle loro qualifiche?", nt:"Verificare il livello di rischio incendio che determina il monte ore di formazione.", campo_extra:{tipo:"nominativo", label:"Addetti antincendio", multiplo:true}},
        {id:"D-01-005", testo:"Sono presenti e documentate le nomine degli Addetti al Primo Soccorso?", nt:"Gruppo A/B/C determina durata e contenuto formazione. Aggiornamento ogni 3 anni.", campo_extra:{tipo:"nominativo", label:"Addetti primo soccorso", multiplo:true}},
        {id:"D-01-010", testo:"Nomina Preposti", nt:"Individuazione e nomina dei preposti, anche di fatto, ai sensi dell'art. 19 e art. 18 c.1 lett. b-bis.", campo_extra:{tipo:"nominativo", label:"Preposti", multiplo:true}},
        {id:"D-01-011", testo:"Nomina Dirigenti (se applicabile)", nt:"Individuazione dei dirigenti con poteri gerarchici/funzionali in materia di sicurezza, ove presenti.", campo_extra:{tipo:"nominativo", label:"Dirigenti", multiplo:true}},
        {id:"D-01-007", testo:"Sono presenti aggiornamenti o revisioni delle nomine a seguito di variazioni organizzative rilevanti?", nt:"Verificare cambi di figure chiave o nuove unità produttive non riflesse negli atti."},
        {id:"D-01-008", testo:"È presente documentazione relativa alla riunione periodica di prevenzione e protezione (ove obbligatoria)?", nt:"Obbligatoria nelle aziende con più di 15 dipendenti."}
      ]},
    { id:"SEZ-02", nome:"Documentazione di sicurezza",
      descrizione:"Disponibilità, completezza e aggiornamento dei documenti di sicurezza obbligatori.",
      domande:[
        {id:"D-02-001", testo:"È presente il Documento di Valutazione dei Rischi (DVR) redatto ai sensi del D.Lgs. 81/2008?", nt:"Verificare data, firma datore/RSPP/RLS e inclusione dei rischi specifici dell'attività."},
        {id:"D-02-002", testo:"Il DVR risulta aggiornato a seguito di modifiche del processo produttivo, dell'organizzazione o degli ambienti?", nt:"Confrontare data ultima revisione con infortuni, modifiche, nuove attrezzature."},
        {id:"D-02-003", testo:"È disponibile il Piano di Emergenza ed Evacuazione (PEE) o documento equivalente?", nt:"Verificare se affisso, conosciuto dai lavoratori e se sono state fatte prove di evacuazione."},
        {id:"D-02-004", testo:"Sono presenti i registri di verifica e manutenzione delle attrezzature soggette a controllo periodico?", nt:"Verificare quali attrezzature presenti rientrano nell'Allegato VII. Niente NC generalizzate."},
        {id:"D-02-005", testo:"È disponibile il documento di valutazione del rischio incendio o la relativa CPI, se richiesta?", nt:"Non tutte le attività richiedono CPI. Verificare D.P.R. 151/2011."},
        {id:"D-02-006", testo:"Sono presenti e aggiornate le schede di sicurezza (SDS) delle sostanze e preparati pericolosi utilizzati?", nt:"Se non si usano sostanze pericolose, classificare come NA."},
        {id:"D-02-008", testo:"Sono presenti autorizzazioni, licenze o certificazioni obbligatorie per lo svolgimento dell'attività specifica?", nt:"Punto generico, dipende dall'attività. Se non rilevante, classificare come NA."}
      ]},
    { id:"SEZ-03", nome:"Formazione, informazione e addestramento",
      descrizione:"Attività di formazione, informazione e addestramento dei lavoratori.",
      domande:[
        {id:"D-03-001", testo:"Formazione lavoratori (generale + specifica + aggiornamento)", nt:"Verificare che tutti i lavoratori abbiano completato formazione generale e specifica per il livello di rischio (basso 8h, medio 12h, alto 16h) e aggiornamento (6h ogni 5 anni). Accordo Stato-Regioni 2025."},
        {id:"D-03-002", testo:"Formazione preposti (12 ore + aggiornamento)", nt:"Verificare formazione specifica per preposti (12 ore) e aggiornamento periodico. Solo se presenti preposti formali o di fatto. Se non applicabile, rispondere NA."},
        {id:"D-03-003", testo:"Formazione dirigenti (12 ore + aggiornamento)", nt:"Verificare formazione specifica per dirigenti (12 ore) e aggiornamento periodico. Solo se presenti dirigenti ai fini sicurezza. Se non applicabile, rispondere NA."},
        {id:"D-03-004", testo:"Formazione Datore di Lavoro (corso 16 ore obbligatorio)", nt:"Verificare attestato corso obbligatorio 16 ore per il Datore di Lavoro. Obbligatorio per tutti i DL indipendentemente dal settore. Accordo Stato-Regioni 2025."},
        {id:"D-03-005", testo:"Formazione DL che svolge direttamente i compiti del SPP (percorso DL-SPP, se applicabile)", nt:"Solo se il DL svolge direttamente i compiti del SPP ai sensi dell'art. 34 D.Lgs. 81/08. Percorso aggiuntivo: modulo comune 8 ore + moduli integrativi di settore. Se non applicabile, rispondere NA."},
        {id:"D-03-006", testo:"Formazione RSPP (Moduli A+B+C se interno; verifica requisiti se esterno)", nt:"Se RSPP interno: verificare Moduli A+B di settore+C, salvo esoneri. Se RSPP esterno: acquisire evidenza dei requisiti formativi del consulente, non organizzare corsi per lui."},
        {id:"D-03-007", testo:"Formazione ASPP (Moduli A+B, se nominato)", nt:"Solo se sono stati nominati ASPP (art. 32 D.Lgs. 81/08). Verificare Moduli A+B e aggiornamenti quinquennali. Se nessun ASPP nominato, rispondere NA."},

const LS_KEY = "safecheck_sopralluogo_v1";

/* =========================================================================
   CONTATORE NUMERO VERBALE — progressivo per anno solare
   -------------------------------------------------------------------------
   Formato numero:  VRB-YYYY-NNN   (es. VRB-2026-001)
   Persistenza:     localStorage["safecheck_verbale_counter"]
                      = { anno: 2026, ultimo_numero: 5 }
   Il contatore si azzera automaticamente al cambio di anno solare:
   al primo verbale di un nuovo anno NNN riparte da 001.
   Funzione isolata: è l'UNICO punto che incrementa il contatore.
   ========================================================================= */
const VERBALE_COUNTER_KEY = "safecheck_verbale_counter";

function nextVerbaleNumber() {
  const annoCorrente = new Date().getFullYear();   // anno della data di sistema
  let counter = { anno: annoCorrente, ultimo_numero: 0 };
  // 1. leggi il counter da localStorage
  try {
    const raw = localStorage.getItem(VERBALE_COUNTER_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      // 2. usa il counter solo se valido e dello stesso anno; altrimenti reset (sotto)
      if (parsed && typeof parsed.ultimo_numero === "number" && parsed.anno === annoCorrente) {
        counter = parsed;
      }
    }
  } catch (e) { /* counter assente/corrotto: si riparte da 0 per l'anno corrente */ }
  // 3. incrementa di 1 (garantendo l'anno corrente)
  counter.anno = annoCorrente;
  counter.ultimo_numero += 1;
  // 4. salva il nuovo counter
  try { localStorage.setItem(VERBALE_COUNTER_KEY, JSON.stringify(counter)); } catch (e) {}
  // 5. restituisci il numero formattato
  return "VRB-" + annoCorrente + "-" + String(counter.ultimo_numero).padStart(3, "0");
}

/* numero da mostrare in UI/PDF: quello salvato nell'anagrafica, oppure
   "VRB-LEGACY" per le bozze create prima di questa funzionalità */
function numeroVerbaleCorrente() {
  return (state.meta && state.meta.numero_verbale) ? state.meta.numero_verbale : "VRB-LEGACY";
}

const todayISO = () => {
  const d = new Date();
  const off = d.getTimezoneOffset();
  return new Date(d.getTime() - off * 60000).toISOString().slice(0, 10);
};
const nowHM = () => {
  const d = new Date();
  const off = d.getTimezoneOffset();
  return new Date(d.getTime() - off * 60000).toISOString().slice(11, 16);
};

const defaultState = () => ({
  meta: {
    consulente: "", cliente: "", data: todayISO(),
    sede: "", indirizzo_sede: "", referente_cliente: "",
    qualifica_tecnico: "RSPP", ora_inizio: nowHM(), note_preliminari: "",
    numero_verbale: ""   // assegnato alla creazione di una nuova visita (non qui)
  },
  note_conclusive: "",
  schermata: "start",   // start | compila | riepilogo
  sezIdx: 0,
  risposte: {}          // { "D-01-001": { v:"C", note:"" } }
});

let state = load();

function load() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (!raw) {
      // primo avvio: nessuna bozza salvata → nuova visita, assegna il numero verbale
      // e persisti subito (così un semplice reload non consuma un nuovo numero)
      const s = defaultState();
      s.meta.numero_verbale = nextVerbaleNumber();
      try { localStorage.setItem(LS_KEY, JSON.stringify(s)); } catch (e) {}
      return s;
    }
    const s = JSON.parse(raw);
    // migrazione: vecchia chiave "note" -> "osservazioni"
    if (s.risposte) {
      Object.keys(s.risposte).forEach(k => {
        const r = s.risposte[k];
        if (r && r.note != null && r.osservazioni == null) { r.osservazioni = r.note; }
        if (r) delete r.note;
      });
    }
    // bozza esistente: si conserva il numero_verbale salvato. Se assente è una
    // bozza "legacy" (creata prima di questa funzionalità): resta "" e UI/PDF
    // mostrano "VRB-LEGACY". NON viene assegnato un numero retroattivamente.
    return { ...defaultState(), ...s, meta: { ...defaultState().meta, ...(s.meta || {}) } };
  } catch (e) {
    const s = defaultState();
    s.meta.numero_verbale = nextVerbaleNumber();
    try { localStorage.setItem(LS_KEY, JSON.stringify(s)); } catch (e2) {}
    return s;
  }
}

function save() {
  try { localStorage.setItem(LS_KEY, JSON.stringify(state)); }
  catch (e) { /* storage pieno o non disponibile: l'app continua in memoria */ }
}

const app = $("#app");
const esc = s => (s == null ? "" : String(s)
  .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"));

function countAnswered() {
  return ALL_Q.filter(q => state.risposte[q.id] && state.risposte[q.id].v).length;
}
function tally() {
  const t = { C:0, PC:0, NC:0, NV:0, NA:0 };
  ALL_Q.forEach(q => { const r = state.risposte[q.id]; if (r && r.v && t[r.v] != null) t[r.v]++; });
  return t;
}

/* tag dei nominativi (figure multiple) — innerHTML del contenitore .nom-tags */
function nomTagsHTML(qid) {
  const arr = getNominativi(qid);
  if (!arr.length) return `<span class="nom-empty">Nessun nominativo inserito</span>`;
  return arr.map((n, i) =>
    `<span class="nom-tag">${esc(n)}<span class="nom-x" data-nom-del="${qid}" data-nom-idx="${i}" role="button" aria-label="Rimuovi ${esc(n)}">×</span></span>`
  ).join("");
}

/* HTML del campo nominativo (campo_extra) — singolo input o lista con aggiunta dinamica */
function nominativoHTML(qid) {
  const ce = campoExtraNominativo(qid);
  if (!ce) return "";
  const r = state.risposte[qid] || {};
  if (!ce.multiplo) {
    return `
      <label class="fld-label">Nominativo ${esc(ce.label)}</label>
      <input type="text" class="nom-single" data-field="nominativo" data-q="${qid}" autocomplete="off" placeholder="Es. Mario Rossi" value="${esc(r.nominativo || "")}">`;
  }
  return `
    <label class="fld-label">Nominativi ${esc(ce.label)}</label>
    <div class="nom-tags" id="nomtags-${qid}">${nomTagsHTML(qid)}</div>
    <div class="nom-add">
      <input type="text" class="nom-input" id="nominput-${qid}" autocomplete="off" placeholder="Es. Mario Rossi">
      <button type="button" class="nom-add-btn" data-nom-add="${qid}">＋ Aggiungi</button>
    </div>`;
}

/* aggiunge/rimuove un nominativo (figure multiple) e aggiorna solo i tag */
function addNominativo(qid) {
  const input = document.getElementById("nominput-" + qid);
  if (!input) return;
  const val = input.value.trim();
  if (!val) return;
  const cur = state.risposte[qid] || {};
  if (!Array.isArray(cur.nominativi)) cur.nominativi = [];
  cur.nominativi.push(val);
  state.risposte[qid] = cur;
  save();
  input.value = "";
  const cont = document.getElementById("nomtags-" + qid);
  if (cont) cont.innerHTML = nomTagsHTML(qid);
  try { input.focus(); } catch (e) {}
}
function removeNominativo(qid, idx) {
  const cur = state.risposte[qid] || {};
  if (!Array.isArray(cur.nominativi)) return;
  cur.nominativi.splice(idx, 1);
  state.risposte[qid] = cur;
  save();
  const cont = document.getElementById("nomtags-" + qid);
  if (cont) cont.innerHTML = nomTagsHTML(qid);
}

/* campi extra di una domanda — skeleton STABILE (i nodi non vengono distrutti al
   cambio esito: updateExtra() li mostra/nasconde, così l'azione correttiva può
   animarsi con max-height). osservazioni è sempre visibile. */
function extraHTML(qid) {
  const r = state.risposte[qid] || {};
  const selOpts = (field, options) =>
    `<select class="fld-select" data-field="${field}" data-q="${qid}">
       ${options.map(o => `<option value="${esc(o)}">${esc(o)}</option>`).join("")}
     </select>`;
  return `
    ${nominativoHTML(qid)}
    <label class="fld-label">Osservazioni / localizzazione del rilievo</label>
    <textarea data-field="osservazioni" data-q="${qid}" placeholder="Es. corridoio reparto 2: estintore mancante">${esc(r.osservazioni || "")}</textarea>

    <div class="collapsible azione-wrap" id="az-${qid}">
      <label class="fld-label">Azione correttiva suggerita</label>
      <textarea class="azione-field" data-field="azione_correttiva" data-q="${qid}" placeholder="Descrivi l'azione correttiva raccomandata...">${esc(r.azione_correttiva || "")}</textarea>
    </div>

    <div class="collapsible" id="ps-${qid}">
      <label class="fld-label">Priorità</label>
      ${selOpts("priorita", PRIORITA)}
      <label class="fld-label">Scadenza suggerita</label>
      ${selOpts("scadenza_suggerita", SCADENZE)}
      <div class="warn">⚠ Per NC/PC è consigliato indicare osservazione, azione correttiva, priorità e scadenza.</div>
    </div>

    <div class="collapsible" id="mot-${qid}">
      <label class="fld-label">Motivazione</label>
      <textarea data-field="motivazione" data-q="${qid}" placeholder="Es. documento non disponibile durante la visita">${esc(r.motivazione || "")}</textarea>
    </div>`;
}

/* mostra/nasconde i campi extra in base all'esito senza ricostruire il DOM */
function updateExtra(qid) {
  const r = state.risposte[qid] || {};
  const v = r.v;
  const showAzione = v === "NC" || v === "PC";
  const showMot    = v === "NV" || v === "NA";

  const azWrap = document.getElementById("az-" + qid);
  if (azWrap) {
    const ta = azWrap.querySelector("textarea");
    if (ta) {
      ta.value = r.azione_correttiva || "";
      ta.classList.remove("nc", "pc");
      if (v === "NC") ta.classList.add("nc");
      else if (v === "PC") ta.classList.add("pc");
    }
    azWrap.classList.toggle("open", showAzione);
  }

  const psWrap = document.getElementById("ps-" + qid);
  if (psWrap) {
    const selP = psWrap.querySelector('[data-field="priorita"]');
    const selS = psWrap.querySelector('[data-field="scadenza_suggerita"]');
    if (selP) selP.value = r.priorita || defPriorita(v);
    if (selS) selS.value = r.scadenza_suggerita || defScadenza(v);
    psWrap.classList.toggle("open", showAzione);
  }

  const motWrap = document.getElementById("mot-" + qid);
  if (motWrap) {
    const ta = motWrap.querySelector("textarea");
    if (ta) {
      ta.value = r.motivazione || "";
      ta.placeholder = v === "NA"
        ? "Es. attività non presente in questa sede"
        : "Es. documento non disponibile durante la visita";
    }
    motWrap.classList.toggle("open", showMot);
  }
}

/* esporta bozza completa in JSON (download, nessuna dipendenza) */
function exportBozza() {
  const payload = {
    app: "SafeCheck",
    template_id: DOMANDE.template_id,
    template_versione: DOMANDE.versione,
    esportato_il: new Date().toISOString(),
    visita: { ...state.meta },
    note_conclusive: state.note_conclusive || "",
    totale_domande: TOT_Q,
    risposte: ALL_Q.map(q => {
      const r = state.risposte[q.id] || {};
      const out = {
        id: q.id,
        sezione: q.sezId,
        sezione_nome: q.sezNome,
        testo: q.testo,
        esito: r.v || null,
        osservazioni: r.osservazioni || "",
        azione_correttiva: r.azione_correttiva || "",
        motivazione: r.motivazione || ""
      };
      if (r.v === "NC" || r.v === "PC") {
        out.priorita = r.priorita || defPriorita(r.v);
        out.scadenza_suggerita = r.scadenza_suggerita || defScadenza(r.v);
      }
      const ce = campoExtraNominativo(q.id);
      if (ce) {
        out.campo_extra = ce.multiplo
          ? { tipo: "nominativo", label: ce.label, nominativi: getNominativi(q.id) }
          : { tipo: "nominativo", label: ce.label, nominativo: r.nominativo || "" };
      }
      return out;
    })
  };
  try {
    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "safecheck-bozza-sopralluogo.json";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 1500);
  } catch (e) {
    alert("Esportazione non riuscita su questo browser. Riprova o usa un browser aggiornato.");
  }
}

/* azzera la bozza, con conferma esplicita */
function nuovoSopralluogo() {
  if (confirm("Confermi di voler cancellare la bozza salvata su questo dispositivo?")) {
    try { localStorage.removeItem(LS_KEY); } catch (e) {}
    state = defaultState();
    state.meta.numero_verbale = nextVerbaleNumber();   // nuova visita → nuovo numero progressivo
    save();
    window.scrollTo(0, 0);
    render();
  }
}

/* =========================================================================
   GENERAZIONE PDF — jsPDF + AutoTable (caricate da CDN)
   Replica la struttura dello spike approvato scripts/spike-pdf.ts adattata
   al modello dati reale dell'app (state.meta / state.risposte C·PC·NC·NV·NA).
   ========================================================================= */
const PDF_LABEL = { C:"Conforme", PC:"Parz. Conforme", NC:"Non Conforme", NV:"Non Verificabile", NA:"Non Applicabile" };
const PDF_COL   = { C:[30,158,84], PC:[224,123,0], NC:[192,57,43], NV:[102,102,102], NA:[153,153,153] };
const PDF_ACCENT=[31,58,95], PDF_TEXT=[26,26,26], PDF_MUTED=[85,85,85], PDF_LINE=[204,204,204], PDF_WHITE=[255,255,255];

function dataBreve(iso) {
  if (!iso) return "—";
  const p = String(iso).split("-");
  return p.length === 3 ? `${p[2]}/${p[1]}/${p[0]}` : iso;
}

function generaVerbalePDF() {
  const ns = window.jspdf;
  if (!ns || !ns.jsPDF) {
    alert("Libreria PDF non disponibile. Verifica la connessione internet e ricarica la pagina.");
    return;
  }
  const { jsPDF } = ns;
  const doc = new jsPDF({ orientation: "p", unit: "mm", format: "a4" });
  if (typeof doc.autoTable !== "function") {
    alert("Plugin tabelle PDF non caricato. Ricarica la pagina e riprova.");
    return;
  }

  const m = state.meta;
  const numero = numeroVerbaleCorrente();
  const dataGen = todayISO();
  const PW = doc.internal.pageSize.getWidth();
  const PH = doc.internal.pageSize.getHeight();
  const MARGIN = 18, CW = PW - MARGIN * 2;
  const tableMargin = { top: 22, bottom: 20, left: MARGIN, right: MARGIN };
  let cursorY = 24;

  const setText = c => doc.setTextColor(c[0], c[1], c[2]);
  const setDraw = c => doc.setDrawColor(c[0], c[1], c[2]);
  const afterTable = () => { cursorY = doc.lastAutoTable.finalY + 5; };
  function ensureSpace(h) { if (cursorY + h > PH - 22) { doc.addPage(); cursorY = 24; } }
  function newPage() { doc.addPage(); cursorY = 24; }
  function heading(label, size) {
    size = size || 13;
    ensureSpace(size * 0.5 + 8);
    doc.setFont("helvetica", "bold"); doc.setFontSize(size); setText(PDF_ACCENT);
    doc.text(label, MARGIN, cursorY);
    cursorY += 2.5;
    setDraw(PDF_LINE); doc.setLineWidth(0.3); doc.line(MARGIN, cursorY, PW - MARGIN, cursorY);
    cursorY += 6; setText(PDF_TEXT);
  }
  function paragraph(s, size, italic) {
    size = size || 10;
    doc.setFont("helvetica", italic ? "italic" : "normal"); doc.setFontSize(size); setText(italic ? PDF_MUTED : PDF_TEXT);
    const lh = size * 0.3528 * 1.18;
    doc.splitTextToSize(s, CW).forEach(ln => { ensureSpace(lh); doc.text(ln, MARGIN, cursorY); cursorY += lh; });
    cursorY += 3; setText(PDF_TEXT);
  }

  /* ---- conteggi e logica esito ---- */
  const counts = tally();
  const perSez = {};
  DOMANDE.sezioni.forEach(s => perSez[s.id] = { C:0, PC:0, NC:0, NV:0, NA:0 });
  ALL_Q.forEach(q => { const r = state.risposte[q.id]; if (r && r.v && perSez[q.sezId][r.v] != null) perSez[q.sezId][r.v]++; });
  const denom = counts.C + counts.PC + counts.NC + counts.NV;
  const pctOf = n => denom === 0 ? "—" : (Math.round((n / denom) * 1000) / 10) + "%";
  const ncAlta = ALL_Q.some(q => { const r = state.risposte[q.id]; return r && r.v === "NC" && (r.priorita || defPriorita("NC")) === "Alta"; });
  let esitoComplessivo;
  if (counts.NC >= 5 || ncAlta) esitoComplessivo = "Non conformità rilevanti — intervento prioritario";
  else if (counts.NC > 0)       esitoComplessivo = "Non conformità presenti — interventi da pianificare";
  else if (counts.PC > 0)       esitoComplessivo = "Situazione parzialmente conforme";
  else                          esitoComplessivo = "Situazione complessivamente conforme";

  /* ============ 1. COPERTINA ============ */
  let y = 38;
  doc.setFont("helvetica", "bold"); doc.setFontSize(16); setText(PDF_ACCENT);
  doc.text("SafeCheck", PW / 2, y, { align: "center" });
  y += 6; doc.setFont("helvetica", "normal"); doc.setFontSize(9); setText(PDF_MUTED);
  doc.text("verbale di sopralluogo — sicurezza sul lavoro", PW / 2, y, { align: "center" });
  y += 22; doc.setFont("helvetica", "bold"); doc.setFontSize(21); setText(PDF_TEXT);
  doc.text("Verbale di Sopralluogo", PW / 2, y, { align: "center" });
  y += 10; doc.setFontSize(15); doc.text("Sicurezza sul Lavoro", PW / 2, y, { align: "center" });
  y += 12; setDraw(PDF_LINE); doc.setLineWidth(0.3); doc.line(MARGIN, y, PW - MARGIN, y); y += 4;

  doc.autoTable({
    startY: y, margin: { left: MARGIN, right: MARGIN }, theme: "plain",
    styles: { fontSize: 10, cellPadding: 1.6, textColor: PDF_TEXT },
    columnStyles: { 0: { fontStyle: "bold", textColor: PDF_MUTED, cellWidth: 48 }, 1: { textColor: PDF_TEXT } },
    body: [
      ["N° verbale", numero],
      ["Cliente", m.cliente || "—"],
      ["Sede", m.sede || "—"],
      ["Indirizzo", m.indirizzo_sede || "—"],
      ["Referente cliente", m.referente_cliente || "—"],
      ["Tecnico", m.consulente || "—"],
      ["Qualifica", m.qualifica_tecnico || "—"],
      ["Data sopralluogo", dataBreve(m.data)],
      ["Ora inizio", m.ora_inizio || "—"]
    ]
  });
  let cy = doc.lastAutoTable.finalY + 8;
  setDraw(PDF_LINE); doc.line(MARGIN, cy, PW - MARGIN, cy); cy += 7;
  doc.setFont("helvetica", "italic"); doc.setFontSize(9); setText(PDF_MUTED);
  doc.text("Documento generato da SafeCheck — uso interno", PW / 2, cy, { align: "center" });
  setText(PDF_TEXT);

  /* ============ 2. NOTE E AVVERTENZE ============ */
  newPage();
  heading("Note e avvertenze");
  paragraph("Il presente verbale riporta i rilievi emersi durante il sopralluogo effettuato presso la sede indicata. Le valutazioni espresse si basano sulle evidenze documentali e visive disponibili al momento della visita. Il documento è redatto ai sensi del D.Lgs. 81/2008 e successive modificazioni. I giudizi espressi non sostituiscono la valutazione dei rischi (DVR) né altri adempimenti previsti dalla normativa vigente.");

  /* ============ 3. RIEPILOGO ESECUTIVO ============ */
  heading("Riepilogo esecutivo");
  paragraph(`Sopralluogo presso ${m.cliente || "—"}${m.sede ? " — " + m.sede : ""} in data ${dataBreve(m.data)}. Sono stati esaminati ${TOT_Q} punti di verifica in ${DOMANDE.sezioni.length} sezioni; ${countAnswered()} risultano compilati.`);

  doc.autoTable({
    startY: cursorY, margin: tableMargin, theme: "grid",
    head: [["Esito", "Conteggio", "% sul verificato"]],
    headStyles: { fillColor: PDF_ACCENT, textColor: PDF_WHITE, fontSize: 9 },
    bodyStyles: { fontSize: 9, textColor: PDF_TEXT },
    columnStyles: { 1: { halign: "center", cellWidth: 30 }, 2: { halign: "center", cellWidth: 42 } },
    body: ["C", "PC", "NC", "NV", "NA"].map(code => [
      { content: PDF_LABEL[code], styles: { textColor: PDF_COL[code], fontStyle: "bold" } },
      { content: String(counts[code]), styles: { halign: "center" } },
      { content: code === "NA" ? "escluso dal calcolo" : pctOf(counts[code]), styles: { halign: "center" } }
    ])
  });
  afterTable();
  ensureSpace(8);
  doc.setFont("helvetica", "bold"); doc.setFontSize(10.5); setText(PDF_TEXT);
  doc.text(`Esito complessivo: ${esitoComplessivo}`, MARGIN, cursorY); cursorY += 5;
  paragraph("Le soglie di esito sono indicative e non costituiscono una classificazione normativa. I punti Non Applicabile (NA) sono esclusi dal denominatore della percentuale.", 8, true);

  // tabella conteggi per sezione — mirror del riepilogo a schermo:
  // nome sezione rosso se ha NC, arancione se solo PC; righe pulite (0 NC/PC) in grigio.
  heading("Conteggi per sezione", 12);
  const COL_NC = [198, 40, 40], COL_PC = [245, 124, 0], GREY_BG = [245, 245, 245], TOT_BG = [232, 236, 242];
  doc.autoTable({
    startY: cursorY, margin: tableMargin, theme: "grid",
    head: [["Sezione", "C", "PC", "NC", "NV", "NA", "Tot"]],
    headStyles: { fillColor: PDF_ACCENT, textColor: PDF_WHITE, fontSize: 8 },
    bodyStyles: { fontSize: 8, textColor: PDF_TEXT },
    columnStyles: { 0: { cellWidth: "auto" }, 1: { cellWidth: 11, halign: "center" }, 2: { cellWidth: 11, halign: "center" }, 3: { cellWidth: 11, halign: "center" }, 4: { cellWidth: 11, halign: "center" }, 5: { cellWidth: 11, halign: "center" }, 6: { cellWidth: 13, halign: "center" } },
    body: (() => {
      const rows = DOMANDE.sezioni.map(s => {
        const c = perSez[s.id], tot = c.C + c.PC + c.NC + c.NV + c.NA;
        const clean = c.NC === 0 && c.PC === 0;
        const nameStyles = { halign: "left" };
        if (c.NC > 0) { nameStyles.textColor = COL_NC; nameStyles.fontStyle = "bold"; }
        else if (c.PC > 0) { nameStyles.textColor = COL_PC; nameStyles.fontStyle = "bold"; }
        const mk = (v, st) => ({ content: String(v), styles: clean ? Object.assign({ fillColor: GREY_BG }, st) : st });
        return [
          mk(`${s.id} — ${s.nome}`, nameStyles),
          mk(c.C, { halign: "center" }), mk(c.PC, { halign: "center" }), mk(c.NC, { halign: "center" }),
          mk(c.NV, { halign: "center" }), mk(c.NA, { halign: "center" }), mk(tot, { halign: "center" })
        ];
      });
      const totVals = [counts.C, counts.PC, counts.NC, counts.NV, counts.NA].reduce((a, b) => a + b, 0);
      rows.push(["Totale", counts.C, counts.PC, counts.NC, counts.NV, counts.NA, totVals].map((v, i) =>
        ({ content: String(v), styles: { halign: i === 0 ? "left" : "center", fontStyle: "bold", fillColor: TOT_BG } })));
      return rows;
    })()
  });
  afterTable();

  /* ============ 4. DETTAGLIO SEZIONI ============
     (NB: NON c'è una lista NC separata — il dettaglio sezioni evidenzia già
     ogni NC/PC con esito colorato e azione correttiva, per evitare duplicazioni) */
  newPage();
  heading("Dettaglio sezioni");
  DOMANDE.sezioni.forEach(s => {
    ensureSpace(22);
    doc.setFont("helvetica", "bold"); doc.setFontSize(11); setText(PDF_ACCENT);
    doc.text(`${s.id} — ${s.nome}`, MARGIN, cursorY); cursorY += 5; setText(PDF_TEXT);
    doc.autoTable({
      startY: cursorY, margin: tableMargin, theme: "grid",
      head: [["#", "Punto di verifica", "Esito", "Azione correttiva", "Osservazioni"]],
      headStyles: { fillColor: PDF_ACCENT, textColor: PDF_WHITE, fontSize: 7.5 },
      bodyStyles: { fontSize: 7.5, textColor: PDF_TEXT, valign: "top" },
      columnStyles: { 0: { cellWidth: 8, halign: "center" }, 1: { cellWidth: "auto" }, 2: { cellWidth: 22, halign: "center" }, 3: { cellWidth: 38 }, 4: { cellWidth: 40 } },
      body: s.domande.map((q, i) => {
        const r = state.risposte[q.id] || {};
        const v = r.v || null;
        // azione correttiva solo per NC/PC; cella vuota (non "—") se assente.
        // È l'unica cella che attinge a r.azione_correttiva: mai replicata in osservazioni.
        const az = (v === "NC" || v === "PC") ? (r.azione_correttiva || "") : "";
        // osservazioni: SOLO il testo inserito dal tecnico (r.osservazioni).
        // Mai il testo dell'azione correttiva. Cella vuota se assente (non "—").
        // Eccezione: il nominativo (SEZ-01 / campo_extra) viene anteposto.
        const nom = nominativoText(q.id);
        let oss = r.osservazioni || "";
        if (nom) oss = (oss ? oss + "\n" : "") + "Nominativo/i: " + nom;
        return [
          String(i + 1),
          q.testo,
          { content: v ? PDF_LABEL[v] : "—", styles: { textColor: v ? PDF_COL[v] : PDF_MUTED, fontStyle: "bold", halign: "center" } },
          az,
          oss
        ];
      })
    });
    afterTable();
  });

  /* ============ 6. NOTE CONCLUSIVE (solo se compilate) ============ */
  if (state.note_conclusive && state.note_conclusive.trim()) {
    ensureSpace(24);
    heading("Note conclusive");
    paragraph(state.note_conclusive);
  }

  /* ============ 7. FIRME ============ */
  ensureSpace(44);
  heading("Firme", 12);
  cursorY += 6;
  doc.setFont("helvetica", "normal"); doc.setFontSize(10); setText(PDF_TEXT);
  doc.text("Il tecnico incaricato: _____________________________     Data: ______________", MARGIN, cursorY);
  cursorY += 16;
  doc.text("Il referente cliente: _____________________________     Data: ______________", MARGIN, cursorY);

  /* ============ HEADER + FOOTER su ogni pagina (copertina esclusa per l'header) ============ */
  const total = doc.getNumberOfPages();
  for (let p = 1; p <= total; p++) {
    doc.setPage(p);
    if (p > 1) {
      doc.setFont("helvetica", "normal"); doc.setFontSize(8); setText(PDF_MUTED);
      const left = `SafeCheck — ${m.cliente || "—"}${m.sede ? " — " + m.sede : ""}`;
      doc.text(doc.splitTextToSize(left, CW - 42)[0], MARGIN, 12);
      doc.text(numero, PW - MARGIN, 12, { align: "right" });
      setDraw(PDF_LINE); doc.setLineWidth(0.3); doc.line(MARGIN, 14.5, PW - MARGIN, 14.5);
    }
    setDraw(PDF_LINE); doc.setLineWidth(0.3); doc.line(MARGIN, PH - 13, PW - MARGIN, PH - 13);
    doc.setFont("helvetica", "normal"); doc.setFontSize(7.5); setText(PDF_MUTED);
    doc.text(`N° verbale: ${numero}  |  Pag. ${p} di ${total}  |  Gen: ${dataBreve(dataGen)}`, PW / 2, PH - 8, { align: "center" });
  }

  doc.save(`safecheck-verbale-${numero}-${dataGen}.pdf`);
}

/* =========================================================================
   RENDER
   ========================================================================= */
function render() {
  if (state.schermata === "compila")  return renderCompila();
  if (state.schermata === "riepilogo") return renderRiepilogo();
  return renderStart();
}

/* ---------- 1. START ---------- */
function renderStart() {
  const m = state.meta;
  const answered = countAnswered();
  app.innerHTML = `
    <div class="pad">
      <div class="brand">
        <div class="logo">S</div>
        <div>
          <h1>SafeCheck</h1>
          <div class="muted">Verbale di sopralluogo — sicurezza sul lavoro</div>
        </div>
      </div>
      <p class="muted">Compila i dati della visita, poi avvia il sopralluogo. Le risposte vengono salvate automaticamente su questo dispositivo.</p>

      <label for="f-cons">Nome consulente</label>
      <input id="f-cons" type="text" inputmode="text" autocomplete="off" placeholder="Es. Mario Rossi" value="${esc(m.consulente)}">

      <label for="f-qual">Qualifica tecnico</label>
      <select id="f-qual">
        ${qualifiche.map(o => `<option value="${esc(o)}"${o === (m.qualifica_tecnico || "RSPP") ? " selected" : ""}>${esc(o)}</option>`).join("")}
      </select>

      <label for="f-cli">Cliente</label>
      <input id="f-cli" type="text" inputmode="text" autocomplete="off" placeholder="Es. Azienda S.r.l." value="${esc(m.cliente)}">

      <label for="f-sede">Sede</label>
      <input id="f-sede" type="text" inputmode="text" autocomplete="off" placeholder="Es. Sede di Roma" value="${esc(m.sede)}">

      <label for="f-ind">Indirizzo sede</label>
      <input id="f-ind" type="text" inputmode="text" autocomplete="off" placeholder="Es. Via Roma 10, 00100 Roma (RM)" value="${esc(m.indirizzo_sede)}">

      <label for="f-ref">Referente cliente</label>
      <input id="f-ref" type="text" inputmode="text" autocomplete="off" placeholder="Es. Giulia Bianchi" value="${esc(m.referente_cliente)}">

      <label for="f-data">Data sopralluogo</label>
      <input id="f-data" type="date" value="${esc(m.data)}">

      <label for="f-ora">Ora inizio</label>
      <input id="f-ora" type="time" value="${esc(m.ora_inizio)}">

      <label for="f-notep">Note preliminari (opzionale)</label>
      <textarea id="f-notep" placeholder="Es. accesso da ingresso laterale; presente il referente RSPP interno">${esc(m.note_preliminari)}</textarea>

      <div style="height:18px"></div>
      <button class="btn" id="b-start">${answered > 0 ? "Riprendi sopralluogo" : "Inizia sopralluogo"}</button>
      ${answered > 0 ? `<p class="muted" style="text-align:center;margin-top:12px">In corso: ${answered}/${TOT_Q} domande risposte</p>
      <button class="btn ghost" id="b-reset" style="margin-top:6px">Nuovo sopralluogo</button>` : ""}

      <p class="footer-note">Template ${esc(DOMANDE.template_id)} · v${esc(DOMANDE.versione)} · ${TOT_Q} domande · 7 sezioni<br>Non inserire dati reali di clienti o aziende in questa fase di test.</p>
    </div>`;

  const bind = (id, ev, fn) => { const el = $("#" + id); if (el) el.addEventListener(ev, fn); };
  const sync = () => {
    state.meta.consulente        = $("#f-cons").value;
    state.meta.qualifica_tecnico = $("#f-qual").value;
    state.meta.cliente           = $("#f-cli").value;
    state.meta.sede              = $("#f-sede").value;
    state.meta.indirizzo_sede    = $("#f-ind").value;
    state.meta.referente_cliente = $("#f-ref").value;
    state.meta.data              = $("#f-data").value;
    state.meta.ora_inizio        = $("#f-ora").value;
    state.meta.note_preliminari  = $("#f-notep").value;
    save();
  };
  ["f-cons","f-qual","f-cli","f-sede","f-ind","f-ref","f-data","f-ora","f-notep"]
    .forEach(id => { bind(id, "input", sync); bind(id, "change", sync); });

  bind("b-start", "click", () => {
    sync();
    state.schermata = "compila";
    save(); render();
  });
  bind("b-reset", "click", nuovoSopralluogo);
}

/* ---------- 2. COMPILA ---------- */
function renderCompila() {
  const si = state.sezIdx;
  const sez = DOMANDE.sezioni[si];
  const answered = countAnswered();
  const pct = Math.round((answered / TOT_Q) * 100);

  const cards = sez.domande.map(q => {
    const r = state.risposte[q.id] || {};
    const opts = ESITI.map(o =>
      `<button class="opt${r.v === o.v ? " sel" : ""}" data-v="${o.v}" data-q="${q.id}" aria-label="${esc(o.label)}">${o.v}</button>`
    ).join("");
    return `
      <div class="q${r.v ? " answered" : ""}" id="q-${q.id}">
        <div class="qid">${esc(q.id)}</div>
        <div class="qtext">${esc(q.testo)}</div>
        <div class="opts">${opts}</div>
        <div class="qextra" id="ex-${q.id}">${extraHTML(q.id)}</div>
        ${q.nt ? `<div class="hint">💡 ${esc(q.nt)}</div>` : ""}
      </div>`;
  }).join("");

  app.innerHTML = `
    <header class="bar">
      <div class="verbale-no">Verbale n. ${esc(numeroVerbaleCorrente())}</div>
      <div class="crumbs">
        <strong>${esc(sez.id)} · ${esc(sez.nome)}</strong>
        <span class="count">${si + 1}/7 — ${answered}/${TOT_Q}</span>
      </div>
      <div class="progress"><span style="width:${pct}%"></span></div>
    </header>
    <div class="pad">
      <div class="sec-desc"><p class="muted">${esc(sez.descrizione)}</p></div>
      ${cards}
      <div class="navrow">
        <button class="btn ghost" id="b-prev" ${si === 0 ? "disabled" : ""}>← Sezione prec.</button>
        ${si < 6
          ? `<button class="btn" id="b-next">Sezione succ. →</button>`
          : `<button class="btn" id="b-summary">Vai al riepilogo →</button>`}
      </div>
      <button class="btn ghost" id="b-home" style="margin-top:4px">Dati visita / Home</button>
      <button class="btn ghost" id="b-jump-summary" style="margin-top:4px">Riepilogo completo</button>
    </div>`;

  // stato iniziale dei campi extra (aperto/chiuso) senza animazione,
  // poi si abilitano le transizioni per le interazioni successive
  sez.domande.forEach(q => updateExtra(q.id));
  requestAnimationFrame(() => app.querySelectorAll(".collapsible").forEach(el => el.classList.add("anim")));

  // selezione esito
  app.querySelectorAll(".opt").forEach(btn => {
    btn.addEventListener("click", () => {
      const qid = btn.getAttribute("data-q");
      const v = btn.getAttribute("data-v");
      const cur = state.risposte[qid] || {};
      cur.v = (cur.v === v) ? null : v;   // ritocca per deselezionare
      if (cur.v === "NC" || cur.v === "PC") {
        // preimposta priorità/scadenza suggerite (se non già definite)
        if (!cur.priorita) cur.priorita = defPriorita(cur.v);
        if (!cur.scadenza_suggerita) cur.scadenza_suggerita = defScadenza(cur.v);
        // azione correttiva: pre-compila col default SOLO la prima volta (mai impostata).
        // Se era stata azzerata in precedenza ("") resta vuota.
        if (cur.azione_correttiva == null) cur.azione_correttiva = correzioneDefault(qid);
      } else {
        // C / NV / NA: azzera silenziosamente l'azione correttiva
        cur.azione_correttiva = "";
      }
      state.risposte[qid] = cur;
      save();
      // aggiorna solo la card e la barra per non perdere scroll
      const card = $("#q-" + qid);
      card.querySelectorAll(".opt").forEach(o =>
        o.classList.toggle("sel", o.getAttribute("data-v") === cur.v));
      card.classList.toggle("answered", !!cur.v);
      // mostra/nascondi (con animazione) i campi extra in base al nuovo esito
      updateExtra(qid);
      const a = countAnswered();
      $(".progress > span").style.width = Math.round((a / TOT_Q) * 100) + "%";
      $(".crumbs .count").textContent = `${si + 1}/7 — ${a}/${TOT_Q}`;
    });
  });

  // salvataggio campi testo (osservazioni / azione_correttiva / motivazione)
  // delega gestita una sola volta su #app (vedi initFieldDelegation)

  const go = (fn) => { fn(); save(); window.scrollTo(0, 0); render(); };
  const bind = (id, fn) => { const el = $("#" + id); if (el) el.addEventListener("click", () => go(fn)); };
  bind("b-prev",    () => { state.sezIdx = Math.max(0, si - 1); });
  bind("b-next",    () => { state.sezIdx = Math.min(6, si + 1); });
  bind("b-summary", () => { state.schermata = "riepilogo"; });
  bind("b-jump-summary", () => { state.schermata = "riepilogo"; });
  bind("b-home",    () => { state.schermata = "start"; });

  // evidenziazione domanda dopo "Modifica" dal riepilogo: scroll + bordo lampeggiante 2s
  if (pendingHighlight) {
    const targetId = pendingHighlight;
    pendingHighlight = null;
    const el = document.getElementById("q-" + targetId);
    if (el) {
      requestAnimationFrame(() => {
        try { el.scrollIntoView({ behavior: "smooth", block: "center" }); }
        catch (e) { el.scrollIntoView(); }
        el.classList.add("flash");
        setTimeout(() => el.classList.remove("flash"), 2000);
      });
    }
  }
}

/* ---------- 3. RIEPILOGO ---------- */
function renderRiepilogo() {
  const m = state.meta;
  const t = tally();
  const answered = countAnswered();

  // conteggi per sezione
  const perSez = {};
  DOMANDE.sezioni.forEach(s => perSez[s.id] = { C:0, PC:0, NC:0, NV:0, NA:0 });
  ALL_Q.forEach(q => { const r = state.risposte[q.id]; if (r && r.v && perSez[q.sezId][r.v] != null) perSez[q.sezId][r.v]++; });
  const sezRows = DOMANDE.sezioni.map(s => {
    const c = perSez[s.id];
    // clean = 0 NC e 0 PC; hasNC = ≥1 NC; onlyPC = PC ma 0 NC
    const cls = c.NC > 0 ? "hasNC" : (c.PC > 0 ? "onlyPC" : "clean");
    return `<tr class="${cls}">
      <td><strong>${esc(s.id)}</strong><span class="sez-nome">${esc(s.nome)}</span></td>
      <td>${c.C}</td><td>${c.PC}</td><td>${c.NC}</td><td>${c.NV}</td><td>${c.NA}</td>
    </tr>`;
  }).join("");

  // lista rilievi ordinata per gravità: NC → PC → NV
  const ord = { NC: 0, PC: 1, NV: 2 };
  const findings = ALL_Q
    .map(q => ({ q, r: state.risposte[q.id] || {} }))
    .filter(x => x.r.v === "NC" || x.r.v === "PC" || x.r.v === "NV")
    .sort((a, b) => ord[a.r.v] - ord[b.r.v]);
  const findHtml = findings.length === 0
    ? `<p class="ok">✓ Nessuna NC, PC o NV rilevata.</p>`
    : `<ul class="findlist">` + findings.map(({ q, r }) => {
        const oss = r.osservazioni && r.osservazioni.trim();
        const az  = r.azione_correttiva && r.azione_correttiva.trim();
        return `<li class="${r.v}">
          <div class="finding-top">
            <span class="badge ${r.v}">${r.v}</span>
            <span class="finding-sez">${esc(q.sezId)} · ${esc(q.sezNome)}</span>
          </div>
          <div class="finding-q">${esc(q.testo)}</div>
          ${oss ? `<div class="finding-oss"><em>${esc(r.osservazioni)}</em></div>` : ""}
          ${az ? `<div class="finding-az">→ ${esc(r.azione_correttiva)}</div>` : ""}
          <button class="btn-mod" data-edit-q="${q.id}" data-edit-sez="${q.sezIdx}">Modifica</button>
        </li>`;
      }).join("") + `</ul>`;

  // domande obbligatorie ancora senza esito → blocca la generazione PDF
  const mancanti = missingObbligatorie();
  const pdfDisabled = mancanti.length > 0;
  const tip = "Completa tutte le domande obbligatorie prima di generare il verbale";
  const mancantiHtml = mancanti.length === 0
    ? `<p class="ok">✓ Tutte le domande obbligatorie sono compilate.</p>`
    : `<ul class="miss">` + mancanti.map(q =>
        `<li><span class="jump" data-edit-q="${q.id}" data-edit-sez="${q.sezIdx}">${esc(q.sezId)} · ${esc(q.id)}</span><br>${esc(q.testo)}</li>`
      ).join("") + `</ul>`;

  app.innerHTML = `
    <header class="bar">
      <div class="crumbs">
        <strong>Riepilogo non conformità</strong>
        <span class="count">${answered}/${TOT_Q}</span>
      </div>
      <p class="rsub">Verifica le NC prima di generare il verbale</p>
      <div class="rmeta">
        <span class="vno">${esc(numeroVerbaleCorrente())}</span> · ${esc(m.cliente || "—")}${m.sede ? " — " + esc(m.sede) : ""} · ${esc(m.data || "—")}
      </div>
    </header>
    <div class="pad">
      <div class="topnav">
        <button id="t-edit">Compilazione</button>
        <button class="active">Riepilogo</button>
      </div>

      <div class="panel">
        <h2>Conteggi per sezione</h2>
        <table class="sezcount">
          <thead><tr><th>Sezione</th><th>C</th><th>PC</th><th>NC</th><th>NV</th><th>NA</th></tr></thead>
          <tbody>${sezRows}</tbody>
          <tfoot><tr><td><strong>Totale</strong></td><td>${t.C}</td><td>${t.PC}</td><td>${t.NC}</td><td>${t.NV}</td><td>${t.NA}</td></tr></tfoot>
        </table>
      </div>

      <div class="panel">
        <h2>Rilievi rilevati <span class="muted">(${findings.length})</span></h2>
        ${findHtml}
      </div>

      <div class="panel">
        <h2>Domande obbligatorie da completare <span class="muted">(${mancanti.length})</span></h2>
        ${mancantiHtml}
      </div>

      <div class="panel">
        <h2>Note conclusive del sopralluogo</h2>
        <textarea id="f-noteconcl" placeholder="Inserisci osservazioni generali, accordi presi con il cliente, indicazioni per la prossima visita...">${esc(state.note_conclusive || "")}</textarea>
      </div>

      ${pdfDisabled ? `<div class="pdf-missing-counter">⚠ ${mancanti.length === 1
          ? "Manca 1 domanda obbligatoria da compilare"
          : "Mancano " + mancanti.length + " domande obbligatorie da compilare"}</div>` : ""}
      <div class="navrow">
        <button class="btn ghost" id="b-back">← Torna alla compilazione</button>
        <button class="btn btn-pdf" id="b-pdf"${pdfDisabled ? ` disabled title="${tip}"` : ""}>Genera verbale PDF →</button>
      </div>
      ${pdfDisabled ? `<p class="muted" style="text-align:center;margin-top:6px">${esc(tip)}.</p>` : ""}

      <button class="btn ghost" id="b-export" style="margin-top:10px">Esporta bozza JSON</button>
      <button class="btn ghost" id="b-home2" style="margin-top:6px">Dati visita / Home</button>
      <button class="btn ghost" id="b-new" style="margin-top:6px">Nuovo sopralluogo</button>

      <p class="footer-note">SafeCheck non certifica la conformità normativa del cliente: supporta solo la raccolta strutturata dei rilievi. La valutazione professionale resta in capo al tecnico utilizzatore.</p>
    </div>`;

  const bind = (id, fn) => { const el = $("#" + id); if (el) el.addEventListener("click", fn); };
  const nc = $("#f-noteconcl");
  if (nc) nc.addEventListener("input", () => { state.note_conclusive = nc.value; save(); });
  bind("b-pdf", () => {
    if (pdfDisabled) return;   // guardia: domande obbligatorie incomplete
    try { generaVerbalePDF(); }
    catch (e) { alert("Generazione PDF non riuscita: " + (e && e.message ? e.message : e)); }
  });
  bind("b-export", exportBozza);
  bind("b-new", nuovoSopralluogo);
  bind("b-back",  () => { state.schermata = "compila"; save(); window.scrollTo(0,0); render(); });
  bind("t-edit",  () => { state.schermata = "compila"; save(); window.scrollTo(0,0); render(); });
  bind("b-home2", () => { state.schermata = "start";   save(); window.scrollTo(0,0); render(); });

  // "Modifica" (su un rilievo) e jump (domanda obbligatoria mancante):
  // torna alla sezione della domanda e la evidenzia con scroll + bordo lampeggiante
  app.querySelectorAll("[data-edit-q]").forEach(el =>
    el.addEventListener("click", () => {
      pendingHighlight = el.getAttribute("data-edit-q");
      state.sezIdx = parseInt(el.getAttribute("data-edit-sez"), 10) || 0;
      state.schermata = "compila";
      save();
      render();
    }));
}

/* =========================================================================
   AVVIO
   ========================================================================= */
// delega input dei campi testo: attaccata UNA volta a #app (sopravvive ai render)
function syncField(el) {
  if (!el || !el.getAttribute) return;
  const field = el.getAttribute("data-field");
  if (!field) return;
  const qid = el.getAttribute("data-q");
  if (!qid) return;
  const cur = state.risposte[qid] || {};
  cur[field] = el.value;
  state.risposte[qid] = cur;
  save();
}
app.addEventListener("input", (e) => syncField(e.target));   // textarea + nominativo singolo
app.addEventListener("change", (e) => syncField(e.target));  // select priorità/scadenza

// nominativi (figure multiple): aggiunta/rimozione via delegazione su #app
app.addEventListener("click", (e) => {
  const add = e.target.closest && e.target.closest("[data-nom-add]");
  if (add) { addNominativo(add.getAttribute("data-nom-add")); return; }
  const del = e.target.closest && e.target.closest("[data-nom-del]");
  if (del) { removeNominativo(del.getAttribute("data-nom-del"), parseInt(del.getAttribute("data-nom-idx"), 10)); }
});
// Invio nel campo nominativo = "Aggiungi"
app.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && e.target.classList && e.target.classList.contains("nom-input")) {
    e.preventDefault();
    addNominativo(e.target.id.replace("nominput-", ""));
  }
});

render();
</script>
</body>
</html>
